name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs on the same branch to avoid race conditions
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build job ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker and export dist/
        uses: docker/build-push-action@v6
        with:
          context: .
          target: export
          outputs: type=local,dest=./dist
          # GitHub Actions cache for Docker layers (speeds up subsequent builds)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Deploy job (main branch only, not PRs) ─────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
